<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎓 班级积分助手</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --primary: #6C5CE7;
      --secondary: #00CEC9;
      --accent: #FDCB6E;
      --bg: #F8F9FF;
      --text: #2D3436;
      --card-bg: #FFFFFF;
      --shadow: 0 4px 20px rgba(108, 92, 231, 0.15);
    }
    
    body {
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
    }
    
    .sidebar {
      width: 260px;
      background: var(--card-bg);
      box-shadow: var(--shadow);
      padding: 20px;
      display: flex;
      flex-direction: column;
    }
    
    .sidebar h2 { color: var(--primary); font-size: 1.3rem; margin-bottom: 20px; }
    .class-list { flex: 1; overflow-y: auto; }
    
    .class-item {
      padding: 12px 16px;
      margin-bottom: 8px;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
    }
    
    .class-item:hover { background: rgba(108, 92, 231, 0.1); }
    .class-item.active { background: var(--primary); color: white; }
    .class-item .delete-btn { opacity: 0; background: none; border: none; cursor: pointer; }
    .class-item:hover .delete-btn { opacity: 0.7; }
    
    .add-class-btn {
      background: var(--secondary);
      color: white;
      border: none;
      padding: 12px;
      border-radius: 12px;
      cursor: pointer;
      margin-top: 12px;
    }
    
    .main { flex: 1; padding: 30px; }
    
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    .header h1 { font-size: 1.8rem; color: var(--primary); }
    .header .student-count { background: var(--accent); padding: 6px 16px; border-radius: 20px; font-weight: 600; }
    
    .add-student-btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 12px;
      cursor: pointer;
    }
    
    .student-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
    }
    
    .student-card {
      background: var(--card-bg);
      border-radius: 20px;
      padding: 24px;
      text-align: center;
      box-shadow: var(--shadow);
      cursor: pointer;
      position: relative;
    }
    
    .student-card:hover { transform: translateY(-4px); }
    
    .student-card .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      margin: 0 auto 12px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
    }
    
    .student-card .avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .student-card .name { font-size: 1.1rem; font-weight: 600; margin-bottom: 8px; }
    .student-card .points { font-size: 2.5rem; font-weight: 800; color: var(--primary); margin-bottom: 16px; }
    .student-card .points.up { animation: pointsUp 0.5s; }
    @keyframes pointsUp { 50% { transform: scale(1.3); color: var(--accent); } }
    
    .student-card .actions { display: flex; justify-content: center; gap: 12px; }
    .student-card .actions button { width: 44px; height: 44px; border-radius: 50%; border: none; cursor: pointer; font-size: 1.4rem; }
    .btn-minus { background: #FFE5E5; color: #E74C3C; }
    .btn-plus { background: #E5F9E5; color: #27AE60; }
    
    .student-card .edit-btn, .student-card .del-btn {
      position: absolute;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      opacity: 0;
    }
    .student-card:hover .edit-btn, .student-card:hover .del-btn { opacity: 0.5; }
    .edit-btn { top: 12px; right: 12px; }
    .del-btn { top: 12px; left: 12px; }
    
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
    }
    .modal-overlay.show { opacity: 1; visibility: visible; }
    
    .modal {
      background: var(--card-bg);
      border-radius: 20px;
      padding: 30px;
      width: 90%;
      max-width: 400px;
    }
    
    .modal h3 { color: var(--primary); margin-bottom: 20px; }
    .modal input { width: 100%; padding: 14px 16px; border: 2px solid #E0E0E0; border-radius: 12px; font-size: 1rem; margin-bottom: 16px; }
    .modal input:focus { outline: none; border-color: var(--primary); }
    
    .modal .avatar-select { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; }
    .modal .avatar-option {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      cursor: pointer;
      border: 3px solid transparent;
      font-size: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal .avatar-option.selected { border-color: var(--primary); background: rgba(108,92,231,0.1); }
    
    .modal .avatar-upload { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .modal .avatar-upload input[type="file"] { display: none; }
    .modal .avatar-upload label { background: var(--secondary); color: white; padding: 10px 16px; border-radius: 8px; cursor: pointer; }
    
    .modal .buttons { display: flex; gap: 12px; }
    .modal .buttons button { flex: 1; padding: 14px; border-radius: 12px; border: none; cursor: pointer; font-size: 1rem; }
    .modal .buttons .save { background: var(--primary); color: white; }
    .modal .buttons .cancel { background: #E0E0E0; }
    
    .celebration {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 2000;
    }
    
    .celebration .mascot {
      position: absolute;
      font-size: 4rem;
      animation: bounce 0.6s ease infinite;
    }
    
    @keyframes bounce {
      0%, 100% { transform: translateY(0) rotate(-10deg); }
      50% { transform: translateY(-30px) rotate(10deg); }
    }
    
    .celebration .coin {
      position: absolute;
      font-size: 2rem;
      animation: fall 1s ease-out forwards;
    }
    
    @keyframes fall {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }
    
    .celebration .points-popup {
      position: absolute;
      font-size: 3rem;
      font-weight: 800;
      color: var(--accent);
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
      animation: popUp 1s ease-out forwards;
    }
    
    @keyframes popUp {
      0% { transform: scale(0); opacity: 0; }
      50% { transform: scale(1.3); }
      100% { transform: scale(1) translateY(-50px); opacity: 0; }
    }
    
    .empty-state { text-align: center; padding: 60px; color: #999; }
    .empty-state .icon { font-size: 4rem; margin-bottom: 16px; }
    
    .config-banner {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      padding: 30px;
      border-radius: 16px;
      text-align: center;
      margin: 20px;
    }
    
    .config-banner h3 { color: white; margin-bottom: 15px; }
    .config-banner p { font-size: 0.95rem; margin-bottom: 8px; }
    .config-banner a { color: white; text-decoration: underline; }
    .config-banner input {
      width: 100%;
      max-width: 350px;
      padding: 12px;
      border: none;
      border-radius: 8px;
      margin: 8px 0;
      font-size: 0.95rem;
    }
    .config-banner button {
      background: white;
      color: var(--primary);
      border: none;
      padding: 12px 30px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      margin-top: 15px;
    }
    
    .hidden { display: none !important; }
    .sync-status { font-size: 0.8rem; color: #888; text-align: center; padding: 8px; }
  </style>
</head>
<body>
  <!-- 配置界面 -->
  <div class="main" id="configView">
    <div class="config-banner">
      <h3>🎓 班级积分助手 - 配置</h3>
      <p>请输入 Bomb 后端云的 AppID 和 API Key</p>
      <br>
      <p style="font-size: 0.9rem;">1. 注册 <a href="https://www.bombax.com" target="_blank">bombax.com</a></p>
      <p style="font-size: 0.9rem;">2. 创建应用 → 我的 → API设置</p>
      <br>
      <input type="text" id="appIdInput" placeholder="App ID（如：abc123）">
      <input type="text" id="apiKeyInput" placeholder="API Key">
      <br>
      <button onclick="saveConfig()">开始使用 ➡️</button>
    </div>
  </div>
  
  <!-- 主界面 -->
  <div class="hidden" id="mainApp">
    <div class="sidebar">
      <h2>🏫 我的班级</h2>
      <div class="class-list" id="classList"></div>
      <button class="add-class-btn" onclick="showAddClassModal()">+ 新建班级</button>
      <div class="sync-status" id="syncStatus">☁️ 已连接</div>
    </div>
    
    <div class="main">
      <div class="header">
        <div>
          <h1 id="currentClassName">请选择班级</h1>
          <span class="student-count" id="studentCount"></span>
        </div>
        <button class="add-student-btn" onclick="showAddStudentModal()">+ 添加学生</button>
      </div>
      <div class="student-grid" id="studentGrid"></div>
    </div>
  </div>
  
  <div class="modal-overlay" id="addClassModal">
    <div class="modal">
      <h3>➕ 新建班级</h3>
      <input type="text" id="classNameInput" placeholder="请输入班级名称">
      <div class="buttons">
        <button class="cancel" onclick="hideModal('addClassModal')">取消</button>
        <button class="save" onclick="saveClass()">保存</button>
      </div>
    </div>
  </div>
  
  <div class="modal-overlay" id="studentModal">
    <div class="modal">
      <h3 id="studentModalTitle">➕ 添加学生</h3>
      <input type="text" id="studentNameInput" placeholder="请输入学生姓名">
      <p style="margin-bottom:8px;color:#666;font-size:0.9rem;">选择头像：</p>
      <div class="avatar-select" id="avatarSelect"></div>
      <div class="avatar-upload">
        <label for="avatarFile">📁 上传自定义头像</label>
        <input type="file" id="avatarFile" accept="image/*">
        <span id="fileName"></span>
      </div>
      <div class="buttons">
        <button class="cancel" onclick="hideModal('studentModal')">取消</button>
        <button class="save" onclick="saveStudent()">保存</button>
      </div>
    </div>
  </div>
  
  <div class="celebration" id="celebration"></div>

  <script>
    const DEFAULT_AVATARS = ['🧑‍🎓','🧑‍💻','👦','👧','🧒','👨‍🎤','👩‍🎓','🧑‍🎨'];
    
    // Bomb API 配置（后面会替换成用户的）
    const BOMB_API = 'https://api.bombax.com/v1';
    
    let appId = '';
    let apiKey = '';
    let data = { classes: {} };
    let currentClass = null;
    let editingStudentKey = null;
    let selectedAvatar = DEFAULT_AVATARS[0];
    let customAvatarData = null;
    let studentsMap = {};
    let collectionName = 'classpoints';
    
    function init() {
      renderAvatarSelect();
      checkConfig();
    }
    
    function checkConfig() {
      appId = localStorage.getItem('bomb_appid');
      apiKey = localStorage.getItem('bomb_apikey');
      
      if (appId && apiKey) {
        initBomb();
      } else {
        document.getElementById('configView').classList.remove('hidden');
      }
    }
    
    function saveConfig() {
      appId = document.getElementById('appIdInput').value.trim();
      apiKey = document.getElementById('apiKeyInput').value.trim();
      
      if (!appId || !apiKey) {
        alert('请填写完整的 App ID 和 API Key');
        return;
      }
      
      localStorage.setItem('bomb_appid', appId);
      localStorage.setItem('bomb_apikey', apiKey);
      location.reload();
    }
    
    async function initBomb() {
      await loadData();
      document.getElementById('configView').classList.add('hidden');
      document.getElementById('mainApp').classList.remove('hidden');
      loadClasses();
    }
    
    // 通用请求方法
    async function bombRequest(path, method = 'GET', body = null) {
      const url = `${BOMB_API}/svc/${appId}/${collectionName}${path}`;
      const headers = {
        'Content-Type': 'application/json',
        'X-API-Key': apiKey
      };
      
      const options = { method, headers };
      if (body) options.body = JSON.stringify(body);
      
      const response = await fetch(url, options);
      return response.json();
    }
    
    async function loadData() {
      try {
        const result = await bombRequest('');
        if (result && result.data) {
          data = result.data;
        } else {
          // 没有数据，创建空数据
          data = { classes: {} };
        }
      } catch (e) {
        console.error('加载数据失败:', e);
        data = { classes: {} };
      }
    }
    
    async function saveData() {
      try {
        // 用 upsert 保存整个数据
        await bombRequest('', 'PUT', { _id: 'main', data });
        document.getElementById('syncStatus').textContent = '☁️ 已同步';
        setTimeout(() => document.getElementById('syncStatus').textContent = '☁️ 已连接', 2000);
      } catch (e) {
        document.getElementById('syncStatus').textContent = '⚠️ 同步失败';
      }
    }
    
    function renderAvatarSelect() {
      const container = document.getElementById('avatarSelect');
      container.innerHTML = DEFAULT_AVATARS.map(avatar => 
        `<div class="avatar-option ${avatar === selectedAvatar ? 'selected' : ''}" onclick="selectAvatar('${avatar.replace(/'/g,"\\'")}')">${avatar}</div>`
      ).join('');
      document.getElementById('avatarFile').addEventListener('change', handleAvatarUpload);
    }
    
    function selectAvatar(avatar) {
      selectedAvatar = avatar;
      customAvatarData = null;
      document.getElementById('fileName').textContent = '';
      renderAvatarSelect();
    }
    
    function handleAvatarUpload(e) {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(event) {
          customAvatarData = event.target.result;
          selectedAvatar = customAvatarData;
          document.getElementById('fileName').textContent = file.name;
          renderAvatarSelect();
        };
        reader.readAsDataURL(file);
      }
    }
    
    function loadClasses() {
      const container = document.getElementById('classList');
      const classes = data.classes || {};
      const classKeys = Object.keys(classes);
      
      if (classKeys.length === 0) {
        container.innerHTML = '<div class="empty-state"><p>暂无班级</p></div>';
        document.getElementById('currentClassName').textContent = '请创建班级';
        document.getElementById('studentCount').textContent = '';
        document.getElementById('studentGrid').innerHTML = '<div class="empty-state"><div class="icon">📚</div><p>点击左侧"新建班级"开始使用</p></div>';
        return;
      }
      
      container.innerHTML = classKeys.map(key => 
        `<div class="class-item ${currentClass === key ? 'active' : ''}" onclick="selectClass('${key}')"><span>${classes[key].name}</span><button class="delete-btn" onclick="event.stopPropagation(); deleteClass('${key}')">🗑️</button></div>`
      ).join('');
      
      if (!currentClass && classKeys.length > 0) selectClass(classKeys[0]);
    }
    
    function selectClass(classId) {
      currentClass = classId;
      const classes = data.classes || {};
      document.getElementById('currentClassName').textContent = classes[classId]?.name || '';
      loadClasses();
      loadStudents();
    }
    
    function loadStudents() {
      const container = document.getElementById('studentGrid');
      const classes = data.classes || {};
      const classData = classes[currentClass];
      studentsMap = classData?.students || {};
      const studentKeys = Object.keys(studentsMap);
      
      if (studentKeys.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="icon">📚</div><p>该班级暂无学生，点击"添加学生"开始记录积分</p></div>';
        document.getElementById('studentCount').textContent = '0 人';
        return;
      }
      
      container.innerHTML = studentKeys.map(key => {
        const student = studentsMap[key];
        return `<div class="student-card" onclick="increasePoints('${key}')">
          <button class="del-btn" onclick="event.stopPropagation(); deleteStudent('${key}')">🗑️</button>
          <button class="edit-btn" onclick="event.stopPropagation(); editStudent('${key}')">✏️</button>
          <div class="avatar">${student.avatar && student.avatar.startsWith('data:') ? '<img src="'+student.avatar+'">' : student.avatar}</div>
          <div class="name">${student.name}</div>
          <div class="points" id="points-${key}">${student.points || 0}</div>
          <div class="actions">
            <button class="btn-minus" onclick="event.stopPropagation(); decreasePoints('${key}')">➖</button>
            <button class="btn-plus" onclick="event.stopPropagation(); increasePoints('${key}')">➕</button>
          </div>
        </div>`;
      }).join('');
      
      document.getElementById('studentCount').textContent = studentKeys.length + ' 人';
    }
    
    function increasePoints(studentKey) {
      if (!data.classes[currentClass].students) data.classes[currentClass].students = {};
      const student = data.classes[currentClass].students[studentKey];
      student.points = (student.points || 0) + 1;
      saveData();
      updatePointsDisplay(studentKey);
      showCelebration();
    }
    
    function decreasePoints(studentKey) {
      const student = data.classes[currentClass].students[studentKey];
      if (student.points > 0) {
        student.points -= 1;
        saveData();
        updatePointsDisplay(studentKey);
      }
    }
    
    function updatePointsDisplay(studentKey) {
      const pointsEl = document.getElementById('points-' + studentKey);
      if (pointsEl) {
        pointsEl.textContent = data.classes[currentClass].students[studentKey].points;
        pointsEl.classList.remove('up');
        pointsEl.classList.add('up');
        setTimeout(() => pointsEl.classList.remove('up'), 500);
      }
    }
    
    function showCelebration() {
      const container = document.getElementById('celebration');
      const mascots = ['🎉','🥳','🦄','🌟','⭐'];
      const coins = ['🪙','💰','✨','🌟'];
      
      const mascotEl = document.createElement('div');
      mascotEl.className = 'mascot';
      mascotEl.textContent = mascots[Math.floor(Math.random() * mascots.length)];
      mascotEl.style.left = (Math.random() * 60 + 20) + '%';
      mascotEl.style.top = '30%';
      container.appendChild(mascotEl);
      
      for (let i = 0; i < 8; i++) {
        const coin = document.createElement('div');
        coin.className = 'coin';
        coin.textContent = coins[Math.floor(Math.random() * coins.length)];
        coin.style.left = (Math.random() * 80 + 10) + '%';
        coin.style.animationDelay = (i * 0.1) + 's';
        container.appendChild(coin);
      }
      
      const popup = document.createElement('div');
      popup.className = 'points-popup';
      popup.textContent = '+1';
      popup.style.left = '50%';
      popup.style.top = '40%';
      container.appendChild(popup);
      
      setTimeout(() => container.innerHTML = '', 1500);
    }
    
    function showModal(id) { document.getElementById(id).classList.add('show'); }
    function hideModal(id) {
      document.getElementById(id).classList.remove('show');
      if (id === 'studentModal') {
        document.getElementById('studentNameInput').value = '';
        selectedAvatar = DEFAULT_AVATARS[0];
        customAvatarData = null;
        editingStudentKey = null;
        renderAvatarSelect();
        document.getElementById('studentModalTitle').textContent = '➕ 添加学生';
      }
    }
    
    function showAddClassModal() { document.getElementById('classNameInput').value = ''; showModal('addClassModal'); }
    function showAddStudentModal() { if (!currentClass) { alert('请先创建或选择一个班级'); return; } showModal('studentModal'); }
    
    function saveClass() {
      const name = document.getElementById('classNameInput').value.trim();
      if (!name) { alert('请输入班级名称'); return; }
      if (!data.classes) data.classes = {};
      const classId = 'class_' + Date.now();
      data.classes[classId] = { name: name, students: {} };
      saveData();
      loadClasses();
      selectClass(classId);
      hideModal('addClassModal');
    }
    
    function deleteClass(classId) {
      if (!confirm('确定要删除该班级吗？')) return;
      delete data.classes[classId];
      if (currentClass === classId) currentClass = null;
      saveData();
      loadClasses();
    }
    
    function saveStudent() {
      const name = document.getElementById('studentNameInput').value.trim();
      if (!name) { alert('请输入学生姓名'); return; }
      const avatar = customAvatarData || selectedAvatar;
      const classData = data.classes[currentClass];
      if (!classData.students) classData.students = {};
      
      if (editingStudentKey) {
        classData.students[editingStudentKey].name = name;
        classData.students[editingStudentKey].avatar = avatar;
      } else {
        const studentId = 'student_' + Date.now();
        classData.students[studentId] = { name: name, avatar: avatar, points: 0 };
      }
      saveData();
      loadStudents();
      hideModal('studentModal');
    }
    
    function editStudent(studentKey) {
      const student = data.classes[currentClass].students[studentKey];
      editingStudentKey = studentKey;
      document.getElementById('studentNameInput').value = student.name;
      selectedAvatar = student.avatar;
      document.getElementById('studentModalTitle').textContent = '✏️ 编辑学生';
      showModal('studentModal');
      renderAvatarSelect();
    }
    
    function deleteStudent(studentKey) {
      if (!confirm('确定要删除该学生吗？')) return;
      delete data.classes[currentClass].students[studentKey];
      saveData();
      loadStudents();
    }
    
    window.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
