<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>班级积分</title>
<style>
body{font-family:'Microsoft YaHei',sans-serif;background:#f5f5f5;padding:20px}
h1{color:#6C5CE7}
.btn{background:#00CEC9;color:#fff;padding:10px 20px;border:none;border-radius:8px;cursor:pointer;font-size:16px;margin:5px}
.btn:hover{transform:translateY(-2px);box-shadow:0 4px 10px rgba(0,206,201,0.4)}
.btn-outline{background:transparent;color:#6C5CE7;border:2px solid #6C5CE7}
.class-item{background:#fff;padding:12px;margin:5px 0;border-radius:8px;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,0.1)}
.class-item:hover{transform:translateY(-2px)}
.class-item.active{background:#6C5CE7;color:#fff}
.student{background:#fff;padding:15px;margin:8px 0;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,0.1);cursor:pointer;position:relative}
.student:hover{transform:translateY(-3px)}
.student .pts{font-size:24px;color:#6C5CE7;font-weight:bold;margin:8px 0}
.student .pts.up{animation:pulse 0.3s ease}
@keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.2);color:#FDCB6E}100%{transform:scale(1)}}
.celeb{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:999}
.celeb div{position:absolute;font-size:28px;animation:fall 1s ease-out}
@keyframes fall{0%{transform:translateY(-30px);opacity:1}100%{transform:translateY(100vh);opacity:0}}
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:none}
.modal.show{display:flex;align-items:center;justify-content:center}
.modal-con{background:#fff;padding:25px;border-radius:12px;width:280px}
.modal-con h3{color:#6C5CE7;margin-bottom:15px}
.modal-con input{width:100%;padding:10px;font-size:15px;border:2px solid #ddd;border-radius:6px;margin-bottom:12px}
.modal-con input:focus{outline:none;border-color:#6C5CE7}
input{font-size:15px;padding:10px;border:2px solid #ddd;border-radius:6px}
input:focus{outline:none;border-color:#6C5CE7}
.status{background:#fff;padding:10px;border-radius:8px;margin-bottom:15px;font-size:14px;color:#666}
.status.online{background:#e8f5e9;color:#2e7d32}
</style>
</head>
<body>
<h1>🏫 班级积分</h1>
<div id="status" class="status">本地模式</div>
<div style="margin-bottom:20px">
<input id="cid" placeholder="班级名"><button class="btn" onclick="addClass()">+新建班级</button>
</div>
<div id="clist"></div>
<hr>
<h2 id="curname">请选择班级</h2>
<button class="btn" onclick="showAdd()">+添加学生</button>
<div id="slist"></div>

<div id="modal" class="modal">
<div class="modal-con">
<h3>添加学生</h3>
<input id="sname" placeholder="学生姓名">
<div>
<button class="btn" onclick="saveStudent()">保存</button>
<button class="btn" onclick="closeModal()" style="background:#999">取消</button>
</div>
</div>
</div>

<div id="celeb" class="celeb"></div>

<script>
var data={classes:{}},cur=null;
var avatars=['🧑‍🎓','🧑‍💻','👦','👧','🧒','👨‍🎤','👩‍🎓','🧑‍🎨'];

function init(){
 var s=localStorage.getItem('cpdata');
 if(s)try{data=JSON.parse(s)}catch(e){}
 renderClasses();
}
function save(){
 localStorage.setItem('cpdata',JSON.stringify(data));
 renderClasses();
}
function renderClasses(){
 var c=document.getElementById('clist'),keys=Object.keys(data.classes);
 if(keys.length===0){
  c.innerHTML='<div style="color:#999">暂无班级，请新建</div>';return;
 }
 c.innerHTML=keys.map(function(k){
  return '<div class="class-item'+(cur===k?' active':'')+'" onclick="selectClass(\''+k+'\')">'+data.classes[k].name+'</div>';
 }).join('');
 if(!cur)selectClass(keys[0]);
}
function selectClass(id){
 cur=id;
 document.getElementById('curname').innerText=data.classes[id].name;
 renderStudents();
}
function renderStudents(){
 var s=document.getElementById('slist'),st=data.classes[cur]?.students||{},keys=Object.keys(st);
 if(keys.length===0){
  s.innerHTML='<div style="color:#999">暂无学生，请添加</div>';
  document.getElementById('curname').innerText=data.classes[cur].name+' (0人)';
  return;
 }
 s.innerHTML=keys.map(function(k){
  return '<div class="student" onclick="addPoints(\''+k+'\')">'+st[k].avatar+' <b>'+st[k].name+'</b><div class="pts" id="p'+k+'">'+st[k].points+'</div></div>';
 }).join('');
 document.getElementById('curname').innerText=data.classes[cur].name+' ('+keys.length+'人)';
}

function addClass(){
 var name=document.getElementById('cid').value.trim();
 if(!name)return alert('请输入班级名');
 var id='c'+Date.now();
 data.classes[id]={name:name,students:{}};
 document.getElementById('cid').value='';
 save();
}

function showAdd(){
 if(!cur)return alert('请先选择班级');
 document.getElementById('sname').value='';
 document.getElementById('modal').classList.add('show');
}
function closeModal(){
 document.getElementById('modal').classList.remove('show');
}
function saveStudent(){
 var name=document.getElementById('sname').value.trim();
 if(!name)return alert('请输入学生姓名');
 if(!data.classes[cur].students)data.classes[cur].students={};
 var id='s'+Date.now();
 data.classes[cur].students[id]={name:name,points:0,avatar:avatars[Math.floor(Math.random()*avatars.length)]};
 closeModal();
 save();
 renderStudents();
}

function addPoints(id){
 data.classes[cur].students[id].points++;
 document.getElementById('p'+id).innerText=data.classes[cur].students[id].points;
 var el=document.getElementById('p'+id);
 el.classList.remove('up');void el.offsetWidth;el.classList.add('up');
 showCeleb();
 save();
}

function showCeleb(){
 var c=document.getElementById('celeb'),mascots=['🎉','🥳','🦄','⭐'],coins=['🪙','💰','✨'];
 var m=document.createElement('div');
 m.textContent=mascots[Math.floor(Math.random()*mascots.length)];
 m.style.left='50%';m.style.top='15%';m.style.fontSize='40px';
 c.appendChild(m);
 for(var i=0;i<8;i++){
  var coin=document.createElement('div');
  coin.textContent=coins[Math.floor(Math.random()*coins.length)];
  coin.style.left=(Math.random()*80+10)+'%';
  coin.style.animationDelay=(i*0.1)+'s';
  c.appendChild(coin);
 }
 setTimeout(function(){c.innerHTML='';},1000);
}

init();
</script>
</body>
</html>
