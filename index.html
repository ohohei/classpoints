<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎓 班级积分助手</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --primary: #6C5CE7;
      --secondary: #00CEC9;
      --accent: #FDCB6E;
      --bg: #F8F9FF;
      --text: #2D3436;
      --card-bg: #FFFFFF;
      --shadow: 0 4px 20px rgba(108, 92, 231, 0.15);
    }
    
    body {
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
    }
    
    .sidebar {
      width: 260px;
      background: var(--card-bg);
      box-shadow: var(--shadow);
      padding: 20px;
      display: flex;
      flex-direction: column;
    }
    
    .sidebar h2 {
      color: var(--primary);
      font-size: 1.3rem;
      margin-bottom: 20px;
    }
    
    .class-list {
      flex: 1;
      overflow-y: auto;
    }
    
    .class-item {
      padding: 12px 16px;
      margin-bottom: 8px;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
    }
    
    .class-item:hover {
      background: rgba(108, 92, 231, 0.1);
    }
    
    .class-item.active {
      background: var(--primary);
      color: white;
    }
    
    .class-item .delete-btn {
      opacity: 0;
      background: none;
      border: none;
      cursor: pointer;
    }
    
    .class-item:hover .delete-btn {
      opacity: 0.7;
    }
    
    .add-class-btn {
      background: var(--secondary);
      color: white;
      border: none;
      padding: 12px;
      border-radius: 12px;
      cursor: pointer;
      margin-top: 12px;
    }
    
    .main {
      flex: 1;
      padding: 30px;
    }
    
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }
    
    .header h1 {
      font-size: 1.8rem;
      color: var(--primary);
    }
    
    .header .student-count {
      background: var(--accent);
      padding: 6px 16px;
      border-radius: 20px;
      font-weight: 600;
    }
    
    .add-student-btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 12px;
      cursor: pointer;
    }
    
    .student-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
    }
    
    .student-card {
      background: var(--card-bg);
      border-radius: 20px;
      padding: 24px;
      text-align: center;
      box-shadow: var(--shadow);
      cursor: pointer;
      position: relative;
    }
    
    .student-card:hover {
      transform: translateY(-4px);
    }
    
    .student-card .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      margin: 0 auto 12px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
    }
    
    .student-card .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }
    
    .student-card .name {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 8px;
    }
    
    .student-card .points {
      font-size: 2.5rem;
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 16px;
    }
    
    .student-card .points.up { animation: pointsUp 0.5s; }
    .student-card .points.down { animation: pointsDown 0.5s; }
    
    @keyframes pointsUp {
      50% { transform: scale(1.3); color: var(--accent); }
    }
    
    .student-card .actions {
      display: flex;
      justify-content: center;
      gap: 12px;
    }
    
    .student-card .actions button {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      font-size: 1.4rem;
    }
    
    .btn-minus { background: #FFE5E5; color: #E74C3C; }
    .btn-plus { background: #E5F9E5; color: #27AE60; }
    
    .student-card .edit-btn, .student-card .del-btn {
      position: absolute;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      opacity: 0;
    }
    
    .student-card:hover .edit-btn, .student-card:hover .del-btn { opacity: 0.5; }
    .edit-btn { top: 12px; right: 12px; }
    .del-btn { top: 12px; left: 12px; }
    
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
    }
    
    .modal-overlay.show { opacity: 1; visibility: visible; }
    
    .modal {
      background: var(--card-bg);
      border-radius: 20px;
      padding: 30px;
      width: 90%;
      max-width: 400px;
    }
    
    .modal h3 { color: var(--primary); margin-bottom: 20px; }
    
    .modal input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #E0E0E0;
      border-radius: 12px;
      font-size: 1rem;
      margin-bottom: 16px;
    }
    
    .modal input:focus { outline: none; border-color: var(--primary); }
    
    .modal .avatar-select {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 20px;
    }
    
    .modal .avatar-option {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      cursor: pointer;
      border: 3px solid transparent;
      font-size: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .modal .avatar-option.selected {
      border-color: var(--primary);
      background: rgba(108,92,231,0.1);
    }
    
    .modal .avatar-upload {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    
    .modal .avatar-upload input[type="file"] { display: none; }
    .modal .avatar-upload label {
      background: var(--secondary);
      color: white;
      padding: 10px 16px;
      border-radius: 8px;
      cursor: pointer;
    }
    
    .modal .buttons { display: flex; gap: 12px; }
    .modal .buttons button {
      flex: 1;
      padding: 14px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-size: 1rem;
    }
    
    .modal .buttons .save { background: var(--primary); color: white; }
    .modal .buttons .cancel { background: #E0E0E0; }
    
    .celebration {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 2000;
    }
    
    .celebration .mascot {
      position: absolute;
      font-size: 4rem;
      animation: bounce 0.6s ease infinite;
    }
    
    @keyframes bounce {
      0%, 100% { transform: translateY(0) rotate(-10deg); }
      50% { transform: translateY(-30px) rotate(10deg); }
    }
    
    .celebration .coin {
      position: absolute;
      font-size: 2rem;
      animation: fall 1s ease-out forwards;
    }
    
    @keyframes fall {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }
    
    .celebration .points-popup {
      position: absolute;
      font-size: 3rem;
      font-weight: 800;
      color: var(--accent);
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
      animation: popUp 1s ease-out forwards;
    }
    
    @keyframes popUp {
      0% { transform: scale(0); opacity: 0; }
      50% { transform: scale(1.3); }
      100% { transform: scale(1) translateY(-50px); opacity: 0; }
    }
    
    .empty-state { text-align: center; padding: 60px; color: #999; }
    .empty-state .icon { font-size: 4rem; margin-bottom: 16px; }
    
    .config-banner {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      padding: 30px;
      border-radius: 16px;
      text-align: center;
    }
    
    .config-banner h3 { color: white; margin-bottom: 15px; }
    .config-banner p { font-size: 0.95rem; margin-bottom: 8px; }
    .config-banner a { color: white; text-decoration: underline; }
    .config-banner input {
      width: 100%;
      max-width: 350px;
      padding: 12px;
      border: none;
      border-radius: 8px;
      margin: 8px 0;
      font-size: 0.95rem;
    }
    .config-banner button {
      background: white;
      color: var(--primary);
      border: none;
      padding: 12px 30px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      margin-top: 15px;
    }
    
    .hidden { display: none !important; }
    .sync-status { font-size: 0.8rem; color: #888; text-align: center; padding: 8px; }
  </style>
</head>
<body>
  <div class="main" id="configView">
    <div class="config-banner">
      <h3>🎓 班级积分助手 - 首次配置</h3>
      <p>请先配置 Firebase（Google免费服务）</p>
      <br>
      <p style="font-size: 0.9rem;">1. 注册 <a href="https://console.firebase.google.com/" target="_blank">firebase.google.com</a></p>
      <p style="font-size: 0.9rem;">2. 创建项目 → Realtime Database → 创建数据库</p>
      <p style="font-size: 0.9rem;">3. 规则选"以测试模式开始" → 项目设置 → 应用凭证</p>
      <br>
      <input type="text" id="apiKeyInput" placeholder="API Key">
      <input type="text" id="authDomainInput" placeholder="authDomain (xxx.firebaseapp.com)">
      <input type="text" id="databaseURLInput" placeholder="databaseURL (https://xxx.firebaseio.com)">
      <input type="text" id="projectIdInput" placeholder="projectId">
      <input type="text" id="storageBucketInput" placeholder="storageBucket (xxx.appspot.com)">
      <input type="text" id="messagingSenderIdInput" placeholder="messagingSenderId">
      <input type="text" id="appIdInput" placeholder="appId">
      <br>
      <button onclick="saveConfig()">开始使用 ➡️</button>
    </div>
  </div>
  
  <div class="hidden" id="mainApp">
    <div class="sidebar">
      <h2>🏫 我的班级</h2>
      <div class="class-list" id="classList"></div>
      <button class="add-class-btn" onclick="showAddClassModal()">+ 新建班级</button>
      <div class="sync-status" id="syncStatus">☁️ 已连接</div>
    </div>
    
    <div class="main">
      <div class="header">
        <div>
          <h1 id="currentClassName">请选择班级</h1>
          <span class="student-count" id="studentCount"></span>
        </div>
        <button class="add-student-btn" onclick="showAddStudentModal()">+ 添加学生</button>
      </div>
      <div class="student-grid" id="studentGrid"></div>
    </div>
  </div>
  
  <div class="modal-overlay" id="addClassModal">
    <div class="modal">
      <h3>➕ 新建班级</h3>
      <input type="text" id="classNameInput" placeholder="请输入班级名称">
      <div class="buttons">
        <button class="cancel" onclick="hideModal('addClassModal')">取消</button>
        <button class="save" onclick="saveClass()">保存</button>
      </div>
    </div>
  </div>
  
  <div class="modal-overlay" id="studentModal">
    <div class="modal">
      <h3 id="studentModalTitle">➕ 添加学生</h3>
      <input type="text" id="studentNameInput" placeholder="请输入学生姓名">
      <p style="margin-bottom:8px;color:#666;font-size:0.9rem;">选择头像：</p>
      <div class="avatar-select" id="avatarSelect"></div>
      <div class="avatar-upload">
        <label for="avatarFile">📁 上传自定义头像</label>
        <input type="file" id="avatarFile" accept="image/*">
        <span id="fileName"></span>
      </div>
      <div class="buttons">
        <button class="cancel" onclick="hideModal('studentModal')">取消</button>
        <button class="save" onclick="saveStudent()">保存</button>
      </div>
    </div>
  </div>
  
  <div class="celebration" id="celebration"></div>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  
  <script>
    const DEFAULT_AVATARS = ['🧑‍🎓','🧑‍💻','👦','👧','🧒','👨‍🎤','👩‍🎓','🧑‍🎨'];
    let db = null;
    let currentClass = null;
    let editingStudentKey = null;
    let selectedAvatar = DEFAULT_AVATARS[0];
    let customAvatarData = null;
    let studentsMap = {};
    
    function init() {
      renderAvatarSelect();
      checkConfig();
    }
    
    function checkConfig() {
      const config = localStorage.getItem('firebase_config');
      if (config) {
        initFirebase(JSON.parse(config));
      } else {
        document.getElementById('configView').classList.remove('hidden');
      }
    }
    
    function saveConfig() {
      const config = {
        apiKey: document.getElementById('apiKeyInput').value.trim(),
        authDomain: document.getElementById('authDomainInput').value.trim(),
        databaseURL: document.getElementById('databaseURLInput').value.trim(),
        projectId: document.getElementById('projectIdInput').value.trim(),
        storageBucket: document.getElementById('storageBucketInput').value.trim(),
        messagingSenderId: document.getElementById('messagingSenderIdInput').value.trim(),
        appId: document.getElementById('appIdInput').value.trim()
      };
      
      if (!config.apiKey || !config.databaseURL) {
        alert('请填写完整的 Firebase 配置');
        return;
      }
      
      localStorage.setItem('firebase_config', JSON.stringify(config));
      location.reload();
    }
    
    function initFirebase(config) {
      firebase.initializeApp(config);
      db = firebase.database();
      document.getElementById('configView').classList.add('hidden');
      document.getElementById('mainApp').classList.remove('hidden');
      loadClasses();
    }
    
    function renderAvatarSelect() {
      const container = document.getElementById('avatarSelect');
      container.innerHTML = DEFAULT_AVATARS.map(avatar => 
        `<div class="avatar-option ${avatar === selectedAvatar ? 'selected' : ''}" onclick="selectAvatar('${avatar.replace(/'/g,"\\'")}')">${avatar}</div>`
      ).join('');
      document.getElementById('avatarFile').addEventListener('change', handleAvatarUpload);
    }
    
    function selectAvatar(avatar) {
      selectedAvatar = avatar;
      customAvatarData = null;
      document.getElementById('fileName').textContent = '';
      renderAvatarSelect();
    }
    
    function handleAvatarUpload(e) {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(event) {
          customAvatarData = event.target.result;
          selectedAvatar = customAvatarData;
          document.getElementById('fileName').textContent = file.name;
          renderAvatarSelect();
        };
        reader.readAsDataURL(file);
      }
    }
    
    function loadClasses() {
      const container = document.getElementById('classList');
      db.ref('classes').on('value', (snapshot) => {
        const data = snapshot.val() || {};
        const classKeys = Object.keys(data);
        
        if (classKeys.length === 0) {
          container.innerHTML = '<div class="empty-state"><p>暂无班级</p></div>';
          document.getElementById('currentClassName').textContent = '请创建班级';
          document.getElementById('studentCount').textContent = '';
          document.getElementById('studentGrid').innerHTML = '<div class="empty-state"><div class="icon">📚</div><p>点击左侧"新建班级"开始使用</p></div>';
          return;
        }
        
        container.innerHTML = classKeys.map(key => 
          `<div class="class-item ${currentClass === key ? 'active' : ''}" onclick="selectClass('${key}')"><span>${data[key].name}</span><button class="delete-btn" onclick="event.stopPropagation(); deleteClass('${key}')">🗑️</button></div>`
        ).join('');
        
        if (!currentClass && classKeys.length > 0) selectClass(classKeys[0]);
      });
    }
    
    function selectClass(classId) {
      currentClass = classId;
      db.ref('classes/' + classId).once('value', (snapshot) => {
        document.getElementById('currentClassName').textContent = snapshot.val()?.name || '';
        loadClasses();
        loadStudents();
      });
    }
    
    function loadStudents() {
      const container = document.getElementById('studentGrid');
      if (!currentClass) return;
      
      db.ref('classes/' + currentClass + '/students').on('value', (snapshot) => {
        studentsMap = snapshot.val() || {};
        const studentKeys = Object.keys(studentsMap);
        
        if (studentKeys.length === 0) {
          container.innerHTML = '<div class="empty-state"><div class="icon">📚</div><p>该班级暂无学生，点击"添加学生"开始记录积分</p></div>';
          document.getElementById('studentCount').textContent = '0 人';
          return;
        }
        
        container.innerHTML = studentKeys.map(key => {
          const student = studentsMap[key];
          return `<div class="student-card" onclick="increasePoints('${key}')">
            <button class="del-btn" onclick="event.stopPropagation(); deleteStudent('${key}')">🗑️</button>
            <button class="edit-btn" onclick="event.stopPropagation(); editStudent('${key}')">✏️</button>
            <div class="avatar">${student.avatar && student.avatar.startsWith('data:') ? '<img src="'+student.avatar+'">'+student.avatar : student.avatar}</div>
            <div class="name">${student.name}</div>
            <div class="points" id="points-${key}">${student.points || 0}</div>
            <div class="actions">
              <button class="btn-minus" onclick="event.stopPropagation(); decreasePoints('${key}')">➖</button>
              <button class="btn-plus" onclick="event.stopPropagation(); increasePoints('${key}')">➕</button>
            </div>
          </div>`;
        }).join('');
        
        document.getElementById('studentCount').textContent = studentKeys.length + ' 人';
      });
    }
    
    function increasePoints(studentKey) {
      const student = studentsMap[studentKey];
      const newPoints = (student.points || 0) + 1;
      db.ref('classes/' + currentClass + '/students/' + studentKey + '/points').set(newPoints);
      updatePointsDisplay(studentKey, 1);
      showCelebration();
    }
    
    function decreasePoints(studentKey) {
      const student = studentsMap[studentKey];
      if (student.points > 0) {
        db.ref('classes/' + currentClass + '/students/' + studentKey + '/points').set(student.points - 1);
        updatePointsDisplay(studentKey, -1);
      }
    }
    
    function updatePointsDisplay(studentKey, delta) {
      const pointsEl = document.getElementById('points-' + studentKey);
      if (pointsEl) {
        pointsEl.textContent = (studentsMap[studentKey].points || 0) + (delta > 0 ? 1 : -1);
        pointsEl.classList.remove('up','down');
        pointsEl.classList.add(delta > 0 ? 'up' : 'down');
        setTimeout(() => pointsEl.classList.remove('up','down'), 500);
      }
    }
    
    function showCelebration() {
      const container = document.getElementById('celebration');
      const mascots = ['🎉','🥳','🦄','🌟','⭐'];
      const coins = ['🪙','💰','✨','🌟'];
      
      const mascotEl = document.createElement('div');
      mascotEl.className = 'mascot';
      mascotEl.textContent = mascots[Math.floor(Math.random() * mascots.length)];
      mascotEl.style.left = (Math.random() * 60 + 20) + '%';
      mascotEl.style.top = '30%';
      container.appendChild(mascotEl);
      
      for (let i = 0; i < 8; i++) {
        const coin = document.createElement('div');
        coin.className = 'coin';
        coin.textContent = coins[Math.floor(Math.random() * coins.length)];
        coin.style.left = (Math.random() * 80 + 10) + '%';
        coin.style.animationDelay = (i * 0.1) + 's';
        container.appendChild(coin);
      }
      
      const popup = document.createElement('div');
      popup.className = 'points-popup';
      popup.textContent = '+1';
      popup.style.left = '50%';
      popup.style.top = '40%';
      container.appendChild(popup);
      
      setTimeout(() => container.innerHTML = '', 1500);
    }
    
    function showModal(id) { document.getElementById(id).classList.add('show'); }
    function hideModal(id) {
      document.getElementById(id).classList.remove('show');
      if (id === 'studentModal') {
        document.getElementById('studentNameInput').value = '';
        selectedAvatar = DEFAULT_AVATARS[0];
        customAvatarData = null;
        editingStudentKey = null;
        renderAvatarSelect();
        document.getElementById('studentModalTitle').textContent = '➕ 添加学生';
      }
    }
    
    function showAddClassModal() { document.getElementById('classNameInput').value = ''; showModal('addClassModal'); }
    function showAddStudentModal() { if (!currentClass) { alert('请先创建或选择一个班级'); return; } showModal('studentModal'); }
    
    function saveClass() {
      const name = document.getElementById('classNameInput').value.trim();
      if (!name) { alert('请输入班级名称'); return; }
      const newRef = db.ref('classes').push();
      newRef.set({ name: name, students: {} });
      hideModal('addClassModal');
    }
    
    function deleteClass(classId) {
      if (!confirm('确定要删除该班级吗？')) return;
      db.ref('classes/' + classId).remove();
      if (currentClass === classId) currentClass = null;
    }
    
    function saveStudent() {
      const name = document.getElementById('studentNameInput').value.trim();
      if (!name) { alert('请输入学生姓名'); return; }
      const avatar = customAvatarData || selectedAvatar;
      
      if (editingStudentKey) {
        db.ref('classes/' + currentClass + '/students/' + editingStudentKey).update({ name: name, avatar: avatar });
      } else {
        const newRef = db.ref('classes/' + currentClass + '/students').push();
        newRef.set({ name: name, avatar: avatar, points: 0 });
      }
      hideModal('studentModal');
    }
    
    function editStudent(studentKey) {
      const student = studentsMap[studentKey];
      editingStudentKey = studentKey;
      document.getElementById('studentNameInput').value = student.name;
      selectedAvatar = student.avatar;
      document.getElementById('studentModalTitle').textContent = '✏️ 编辑学生';
      showModal('studentModal');
      renderAvatarSelect();
    }
    
    function deleteStudent(studentKey) {
      if (!confirm('确定要删除该学生吗？')) return;
      db.ref('classes/' + currentClass + '/students/' + studentKey).remove();
    }
    
    window.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
