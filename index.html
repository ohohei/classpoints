<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>班级积分</title>
<style>
body{font-family:sans-serif;background:#f5f5f5;padding:20px}
h1{color:#6C5CE7}
.btn{background:#00CEC9;color:#fff;padding:10px 20px;border:none;border-radius:8px;cursor:pointer;font-size:16px;margin:5px}
.card{background:#fff;padding:20px;margin:10px 0;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
.pts{font-size:24px;color:#6C5CE7;font-weight:bold}
</style>
</head>
<body>
<h1>🏫 班级积分</h1>
<input id="newClass" placeholder="班级名"><button class="btn" onclick="addClass()">+新建班级</button>
<div id="classes"></div>
<hr>
<h1 id="cname">请选择班级</h1>
<button class="btn" onclick="showAdd()">+添加学生</button>
<div id="students"></div>

<div id="modal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5)">
<div style="background:#fff;padding:30px;border-radius:12px;max-width:300px;margin:100px auto">
<h3>添加学生</h3>
<input id="sname" placeholder="姓名">
<button class="btn" onclick="addStudent()">保存</button>
<button class="btn" onclick="closeModal()" style="background:#ccc">取消</button>
</div>
</div>

<script>
var data={classes:{}},cur=null,editId=null;
function init(){var s=localStorage.getItem('cp');if(s)data=JSON.parse(s);render();}
function save(){localStorage.setItem('cp',JSON.stringify(data));render();}
function render(){
 var c=document.getElementById('classes'),k=Object.keys(data.classes);
 c.innerHTML=k.length?k.map(x=>'<div class="card" onclick="sel(\''+x+'\')">'+data.classes[x].name+'</div>').join(''):'暂无班级';
 if(k.length&&!cur)sel(k[0]);
}
function sel(id){cur=id;document.getElementById('cname').innerText=data.classes[id].name;renderStu();}
function renderStu(){
 var s=document.getElementById('students'),st=data.classes[cur]?.students||{},k=Object.keys(st);
 s.innerHTML=k.length?k.map(x=>'<div class="card" onclick="inc(\''+x+'\');event.stopPropagation()"><b>'+st[x].name+'</b><div class="pts" id="p'+x+'">'+st[x].points+'</div></div>').join(''):'暂无学生';
}
function addClass(){
 var n=document.getElementById('newClass').value.trim();
 if(!n)return;
 var id='c'+Date.now();
 data.classes[id]={name:n,students:{}};
 save();
}
function sel(id){cur=id;document.getElementById('cname').innerText=data.classes[id].name;renderStu();}
function showAdd(){document.getElementById('modal').style.display='block';}
function closeModal(){document.getElementById('modal').style.display='none';}
function addStudent(){
 var n=document.getElementById('sname').value.trim();
 if(!n)return;
 if(!data.classes[cur].students)data.classes[cur].students={};
 var id='s'+Date.now();
 data.classes[cur].students[id]={name:n,points:0};
 document.getElementById('sname').value='';
 closeModal();save();
}
function inc(id){data.classes[cur].students[id].points++;document.getElementById('p'+id).innerText=data.classes[cur].students[id].points;save();}
init();
</script>
</body>
</html>
